<style>
:root {
  --purple-50:#EEEDFE;--purple-100:#CECBF6;--purple-200:#AFA9EC;--purple-400:#7F77DD;--purple-600:#534AB7;--purple-800:#3C3489;--purple-900:#26215C;
  --teal-50:#E1F5EE;--teal-100:#9FE1CB;--teal-400:#1D9E75;--teal-600:#0F6E56;--teal-800:#085041;
  --coral-50:#FAECE7;--coral-100:#F5C4B3;--coral-200:#F0997B;--coral-400:#D85A30;--coral-600:#993C1D;--coral-800:#712B13;
  --amber-50:#FAEEDA;--amber-100:#FAC775;--amber-400:#BA7517;--amber-600:#854F0B;--amber-800:#633806;
  --blue-50:#E6F1FB;--blue-100:#B5D4F4;--blue-400:#378ADD;--blue-600:#185FA5;--blue-800:#0C447C;
  --green-50:#EAF3DE;--green-100:#C0DD97;--green-400:#639922;--green-600:#3B6D11;--green-800:#27500A;
  --pink-50:#FBEAF0;--pink-100:#F4C0D1;--pink-400:#D4537E;--pink-600:#993556;--pink-800:#72243E;
  --gray-50:#F1EFE8;--gray-100:#D3D1C7;--gray-400:#888780;--gray-600:#5F5E5A;--gray-800:#444441;
  --bg:#F5F0E8;--surface:#FDFAF5;--text:#2A2520;--text-2:#6B6560;--text-3:#A09890;
  --border:#E0D8CC;--border-2:#C8BEB0;
  --radius-sm:6px;--radius-md:10px;--radius-lg:14px;--radius-xl:20px;
  --font:'Noto Sans JP',sans-serif;--mono:'DM Mono',monospace;
}

*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.6}
body{display:flex;min-height:100vh}

/* Sidebar */
.sidebar{width:200px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:1.5rem 1rem 2rem;display:flex;flex-direction:column;gap:0;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar-cal{margin-bottom:1.25rem}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.cal-month{font-size:11px;font-weight:700;color:var(--text-2);font-family:var(--mono);letter-spacing:.04em}
.cal-nav{background:none;border:none;cursor:pointer;color:var(--text-3);font-size:11px;padding:1px 4px;line-height:1}
.cal-nav:hover{color:var(--text-2)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{font-size:9px;text-align:center;color:var(--text-3);padding-bottom:2px;font-weight:600}
.cal-day{font-size:10px;text-align:center;padding:3px 1px;border-radius:4px;line-height:1.4;color:var(--text-2);font-family:var(--mono)}
.cal-day.other-month{color:var(--text-3);opacity:.4}
.cal-day.today{background:var(--purple-600);color:#fff!important;font-weight:700;border-radius:50%}
.cal-day.has-task{background:var(--amber-50);color:var(--amber-600)!important;font-weight:700}
.cal-day.today.has-task{background:var(--coral-400);color:#fff!important}
.cal-day.sun{color:var(--coral-400)}
.cal-day.sat{color:var(--blue-400)}
.sidebar-title{font-size:11px;font-weight:700;color:var(--purple-600);font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.sidebar-app{font-size:13px;font-weight:500;color:#6B5744;letter-spacing:.04em;margin-bottom:1.5rem;display:flex;align-items:center;gap:8px;font-family:var(--mono)}
.sidebar-app-text{flex:1}
.sidebar-app-add{display:none}
.mobile-gcal{display:none}

/* Stat buttons in sidebar */
.stats{display:flex;flex-direction:column;gap:8px;margin-bottom:1.5rem}
.stat{border-radius:var(--radius-lg);padding:12px 14px;border:1.5px solid transparent;transition:transform .1s,box-shadow .1s;cursor:pointer;user-select:none;text-align:left}
.stat:hover{transform:translateX(2px);box-shadow:2px 2px 8px rgba(0,0,0,.07)}
.stat.active{border-width:2px;box-shadow:2px 2px 10px rgba(0,0,0,.1)}
.stat-n{font-size:22px;font-weight:700;font-family:var(--mono);line-height:1}
.stat-l{font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;margin-top:3px}
.stat-all{background:var(--purple-50);border-color:var(--purple-200)}.stat-all .stat-n{color:var(--purple-800)}.stat-all .stat-l{color:var(--purple-600)}.stat-all.active{border-color:var(--purple-600)}
.stat-wip{background:var(--blue-50);border-color:var(--blue-100)}.stat-wip .stat-n{color:var(--blue-800)}.stat-wip .stat-l{color:var(--blue-600)}.stat-wip.active{border-color:var(--blue-600)}
.stat-done{background:var(--green-50);border-color:var(--green-100)}.stat-done .stat-n{color:var(--green-800)}.stat-done .stat-l{color:var(--green-600)}.stat-done.active{border-color:var(--green-600)}
.stat-hi{background:var(--coral-50);border-color:var(--coral-100)}.stat-hi .stat-n{color:var(--coral-800)}.stat-hi .stat-l{color:var(--coral-600)}.stat-hi.active{border-color:var(--coral-600)}
.stat-priv{background:#FCEBEB;border-color:#F7C1C1}.stat-priv .stat-n{color:#791F1F}.stat-priv .stat-l{color:#A32D2D}.stat-priv.active{border-color:#A32D2D}

.sidebar-add{margin-top:auto;padding-top:1.5rem}
.add-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:9px 0;background:var(--purple-600);color:#fff;border:none;border-radius:var(--radius-md);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font);transition:background .15s}
.add-btn:hover{background:var(--purple-800)}
.add-btn .plus{font-size:18px;line-height:1;margin-top:-1px}
.save-note{font-size:10px;color:var(--text-3);font-family:var(--mono);margin-top:8px;text-align:center}
.sync-status{font-size:10px;font-family:var(--mono);margin-top:4px;text-align:center;min-height:14px}
.sync-ok{color:var(--green-600)}.sync-ing{color:var(--amber-600)}.sync-err{color:var(--coral-600)}
.backup-btn{display:flex;align-items:center;justify-content:center;gap:5px;width:100%;margin-top:6px;padding:7px 0;font-size:12px;font-weight:500;border-radius:var(--radius-md);border:1.5px solid var(--border);background:transparent;color:var(--text-2);cursor:pointer;font-family:var(--font);transition:all .15s}
.backup-btn:hover{background:var(--bg);border-color:var(--border-2);color:var(--text)}
.restore-btn{color:var(--text-3)}
.gcal-btn{border-color:var(--blue-100);color:var(--blue-600)}
.gcal-btn:hover{background:var(--blue-50);border-color:var(--blue-400)}
.gcal-status{font-size:10px;font-family:var(--mono);margin-top:4px;text-align:center;min-height:14px;color:var(--text-3)}
.tools-toggle{display:flex;align-items:center;justify-content:center;gap:5px;width:100%;margin-top:10px;padding:6px 0;font-size:11px;font-weight:600;border-radius:var(--radius-md);border:1.5px solid var(--border);background:transparent;color:var(--text-3);cursor:pointer;font-family:var(--font);letter-spacing:.04em;text-transform:uppercase;transition:all .15s;position:relative;z-index:1}
.tools-toggle:hover{background:var(--bg);color:var(--text-2)}
.tools-panel{position:absolute;bottom:100%;left:0;right:0;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:8px;margin-bottom:4px;display:none;flex-direction:column;gap:0;box-shadow:0 -4px 16px rgba(0,0,0,.08)}
.tools-panel.open{display:flex}
.tools-panel-wrap{position:relative;margin-top:10px}
.mobile-preview-btn{border-color:var(--purple-200);color:var(--purple-600)}
.mobile-preview-btn:hover{background:var(--purple-50)}
/* モバイルプレビューモード（?mobile=1） */
body.mobile-preview{flex-direction:column}
body.mobile-preview .sidebar{width:100%;height:auto;position:static;border-right:none;border-bottom:1px solid var(--border);padding:0.75rem 1rem}
body.mobile-preview .sidebar-title{display:none}
body.mobile-preview .sidebar-add{display:none}
body.mobile-preview .stats{display:none}
body.mobile-preview .mobile-gcal{display:block;padding:0.75rem 0.75rem 0}
body.mobile-preview .mobile-hide{display:none!important}
body.mobile-preview .col-cat-badge{display:none}
body.mobile-preview .toolbar{display:none}
body.mobile-preview .main{padding:0.75rem 0.75rem 5rem}
body.mobile-preview .float-add-btn{display:flex}
body.mobile-preview .float-search-btn{display:flex}
body.mobile-preview .dl-txt{display:block!important;min-width:auto;font-size:11px}
body.mobile-preview .dl-txt::before{content:'〜'}

/* Main content */
.main{flex:1;min-width:0;padding:1.5rem 1.5rem 4rem}

/* 2カラムレイアウト（デスクトップ） */
.main-columns{display:flex;gap:1.5rem;align-items:flex-start}
.main-left{flex:1;min-width:0}
.main-right{width:300px;flex-shrink:0;display:flex;flex-direction:column;gap:1rem;position:sticky;top:1.5rem}
.main-third{width:280px;flex-shrink:0;display:flex;flex-direction:column;gap:1rem;position:sticky;top:1.5rem}
.widget{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem}
.widget-title{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--text-2);letter-spacing:.05em;text-transform:uppercase;margin-bottom:.875rem}
.widget-loading{font-size:12px;color:var(--text-3)}
.weather-now{display:flex;align-items:center;gap:12px;margin-bottom:.75rem}
.weather-temp{font-size:36px;font-weight:700;font-family:var(--mono);color:var(--text);line-height:1}
.weather-desc{font-size:13px;color:var(--text-2)}
.weather-sub{font-size:11px;color:var(--text-3);margin-top:2px}
.weather-hourly{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.weather-hour{text-align:center;font-size:11px;color:var(--text-2);background:var(--bg);border-radius:var(--radius-sm);padding:6px 4px}
.weather-hour-time{color:var(--text-3);margin-bottom:2px}
.weather-hour-temp{font-weight:700;font-family:var(--mono)}
.news-list{display:flex;flex-direction:column}
.news-item{padding:8px 0;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:3px;cursor:pointer;transition:background .1s}
.news-item:last-child{border-bottom:none;padding-bottom:0}
.news-item:hover{background:var(--bg);margin:0 -8px;padding-left:8px;padding-right:8px;border-radius:var(--radius-sm)}
.news-item a{font-size:12px;color:var(--text);text-decoration:none;line-height:1.5}
.news-item a:hover{color:var(--purple-600)}
.news-item-meta{display:flex;align-items:center;gap:6px}
.news-item-time{font-size:11px;font-weight:700;font-family:var(--mono);color:var(--text-2)}
.news-item-cat{font-size:10px;font-weight:600;padding:1px 6px;border-radius:10px;letter-spacing:.03em}
.cat-politics{background:var(--blue-50);color:var(--blue-600)}
.cat-economy{background:var(--amber-50);color:var(--amber-600)}
.cat-world{background:var(--teal-50);color:var(--teal-600)}
.cat-disaster{background:var(--coral-50);color:var(--coral-600)}
.cat-sports{background:var(--green-50);color:var(--green-600)}
.cat-culture{background:var(--purple-50);color:var(--purple-600)}
.news-widget{overflow-y:auto;max-height:calc(100vh - 260px)}
.fx-rate{display:flex;align-items:baseline;gap:8px}
.fx-pair{font-size:11px;color:var(--text-3);font-family:var(--mono)}
.fx-value{font-size:28px;font-weight:700;font-family:var(--mono);color:var(--text);line-height:1}
.fx-unit{font-size:12px;color:var(--text-3)}
.fx-updated{font-size:10px;color:var(--text-3);margin-top:4px;font-family:var(--mono)}
@media(max-width:960px){.main-right{display:none}.main-third{display:none}}
body.mobile-preview .main-right{display:none}
body.mobile-preview .main-third{display:none}
body.mobile-preview .main-columns{display:block}
@media(max-width:1280px){.main-third{display:none}}

/* Toolbar */
.toolbar{display:none}
.toolbar input[type=text],.toolbar select{font-size:13px;padding:6px 10px;border-radius:var(--radius-md);border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font);height:34px;outline:none;transition:border-color .15s}
.toolbar input[type=text]{flex:1;min-width:120px}
.toolbar input[type=text]:focus,.toolbar select:focus{border-color:var(--purple-400)}
.toolbar select{cursor:pointer}

/* Group */
.group{border-radius:var(--radius-lg);overflow:hidden;margin-bottom:12px;border:1.5px solid transparent;transition:box-shadow .15s}
.group:hover{box-shadow:0 2px 12px rgba(0,0,0,.06)}
.group-header{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none;transition:filter .1s}
.group-header:hover{filter:brightness(.97)}
.g-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;color:#fff}
.g-name{font-size:13px;font-weight:700;flex:1;letter-spacing:-.01em}
.g-meta{font-size:11px;font-weight:500;opacity:.7;font-family:var(--mono)}
.g-prog-wrap{width:72px;height:5px;border-radius:3px;background:rgba(0,0,0,.12);overflow:hidden;flex-shrink:0}
.g-prog{height:100%;border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.g-chevron{font-size:9px;opacity:.5;transition:transform .2s;flex-shrink:0}
.g-chevron.open{transform:rotate(90deg)}

/* Task rows */
.group-body{background:var(--surface)}
.task-row{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);transition:background .1s}
.task-row:last-child{border-bottom:none}
.t-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border-2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;background:transparent}
.t-check.done{background:var(--green-400);border-color:var(--green-400)}
.t-check.done::after{content:'✓';color:#fff;font-size:10px;line-height:1}
.t-check.wip{background:transparent;border-color:var(--border-2)}
.t-title{flex:1;font-size:13px;color:var(--text);line-height:1.4;min-width:0}
.t-title.is-done{color:var(--text-3);text-decoration:line-through}
.t-memo{font-size:11px;color:var(--text-3);margin-top:2px}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap;flex-shrink:0;font-family:var(--mono)}
.p-high{background:var(--coral-50);color:var(--coral-600);border:1px solid var(--coral-100)}
.p-mid{background:var(--amber-50);color:var(--amber-600);border:1px solid var(--amber-100)}
.p-low{background:var(--green-50);color:var(--green-600);border:1px solid var(--green-100)}
.s-wip{background:var(--blue-50);color:var(--blue-600);border:1px solid var(--blue-100)}
.s-done{background:var(--green-50);color:var(--green-600);border:1px solid var(--green-100)}
.row-high{background:#FEF2F2}
.row-mid{background:var(--surface)}
.row-low{background:#F5F5F3}
.row-done{background:var(--surface);opacity:.5}
.row-imminent{background:#FECACA}
.task-row.row-high:hover{background:#FDE8E8}
.task-row.row-mid:hover{background:var(--bg)}
.task-row.row-low:hover{background:#ECECEA}
.task-row.row-imminent:hover{background:#FCA5A5}
.repeat-badge{font-size:11px;color:var(--purple-600);font-family:var(--mono);flex-shrink:0;white-space:nowrap}
.dirty-badge{font-size:9px;color:var(--amber-600);flex-shrink:0;line-height:1}
.dl-txt{font-size:11px;color:var(--text-3);flex-shrink:0;min-width:74px;text-align:right;font-family:var(--mono)}
.dl-over{color:var(--coral-600);font-weight:700}
.dl-week-near{color:var(--coral-600);font-weight:700}
.act-btn{width:28px;height:28px;padding:0;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--text-3);cursor:pointer;transition:all .15s;flex-shrink:0}
.act-btn:hover{background:var(--bg);color:var(--text-2)}
.del-btn:hover{background:var(--coral-50);color:var(--coral-600)}
.drag-handle{width:16px;height:16px;flex-shrink:0;cursor:grab;opacity:.25;display:flex;flex-direction:column;justify-content:center;gap:3px;padding:1px}
.drag-handle:hover{opacity:.6}
.drag-handle span{display:block;height:1.5px;background:var(--text);border-radius:1px}
.drag-handle:active{cursor:grabbing}
.task-row.dragging{opacity:.4;background:var(--purple-50)}
.task-row.drag-over{border-top:2px solid var(--purple-400)}
.group.cat-dragging{opacity:.4}
.group.cat-drag-over{outline:2px solid var(--purple-400);outline-offset:-2px}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-xl);border:1.5px solid var(--border);padding:1.5rem;width:min(420px,94vw);animation:modalIn .18s cubic-bezier(.4,0,.2,1)}
@keyframes modalIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.modal h3{font-size:16px;font-weight:700;margin-bottom:1.25rem;color:var(--text)}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--text-2);margin-bottom:4px;letter-spacing:.05em;text-transform:uppercase}
.field input,.field select,.field textarea{width:100%;font-size:13px;padding:7px 10px;border-radius:var(--radius-md);border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font);outline:none;transition:border-color .15s;box-sizing:border-box}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--purple-400)}
.field textarea{height:56px;resize:vertical}
.float-add-btn{display:flex;align-items:center;justify-content:center;position:fixed;bottom:1.5rem;right:1.5rem;width:52px;height:52px;background:var(--purple-600);color:#fff;border:none;border-radius:50%;font-size:26px;line-height:1;cursor:pointer;z-index:50;box-shadow:0 4px 16px rgba(83,74,183,.45)}
.float-add-btn:active{background:var(--purple-800);transform:scale(0.95)}
.float-search-btn{display:flex;align-items:center;justify-content:center;position:fixed;bottom:1.5rem;right:5.5rem;width:52px;height:52px;background:var(--surface);color:var(--text-2);border:1.5px solid var(--border-2);border-radius:50%;cursor:pointer;z-index:50;box-shadow:0 4px 12px rgba(0,0,0,.12)}
.float-search-btn:active{transform:scale(0.95)}
@media(min-width:961px){
  .float-add-btn{right:calc(300px + 1.5rem + 1.5rem)}
  .float-search-btn{right:calc(300px + 1.5rem + 1.5rem + 4rem)}
}
@media(min-width:1281px){
  .float-add-btn{right:calc(300px + 280px + 1.5rem + 1.5rem + 1.5rem)}
  .float-search-btn{right:calc(300px + 280px + 1.5rem + 1.5rem + 1.5rem + 4rem)}
}
.mobile-search-overlay{position:fixed;top:0;left:0;right:0;z-index:200;background:var(--surface);border-bottom:1.5px solid var(--border);padding:0.75rem 1rem;display:none;align-items:center;gap:8px}
.mobile-search-overlay.open{display:flex}
.mobile-search-overlay input{flex:1;font-size:14px;padding:8px 12px;border-radius:var(--radius-md);border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font);outline:none}
.mobile-search-overlay input:focus{border-color:var(--purple-400)}
.mobile-search-overlay button{width:36px;height:36px;border:none;background:transparent;font-size:18px;color:var(--text-2);cursor:pointer;flex-shrink:0}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}
.mbtns button{height:34px;padding:0 16px;font-size:13px;border-radius:var(--radius-md);border:1.5px solid var(--border);cursor:pointer;background:transparent;color:var(--text);font-family:var(--font);font-weight:500;transition:all .15s}
.mbtns button:hover{background:var(--bg)}
.mbtns .ok{background:var(--purple-600);color:#fff;border-color:var(--purple-600)}
.mbtns .ok:hover{background:var(--purple-800);border-color:var(--purple-800)}

.empty-group{text-align:center;color:var(--text-3);padding:1.5rem;font-size:13px}
.empty-search{text-align:center;color:var(--text-3);padding:3rem 0;font-size:13px;border:1.5px dashed var(--border);border-radius:var(--radius-lg)}

@media(max-width:640px){
  body{flex-direction:column}
  .sidebar{width:100%;height:auto;position:static;border-right:none;border-bottom:1px solid var(--border);padding:0.75rem 1rem 0.75rem}
  .sidebar-title{display:none}
  .sidebar-app{margin-bottom:0.6rem}
  .sidebar-app-text{font-size:16px;flex:1}
  .sidebar-app-add{display:none!important}
  .mobile-prio-select{display:none}
  .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:0}
  .stat{padding:7px 10px}
  .stat-n{font-size:17px}
  .stat-l{font-size:10px}
  .sidebar-add{display:none}
  .toolbar{display:none}
  .stats{display:none}
  .mobile-hide{display:none!important}
  .mobile-tap-edit{cursor:pointer}
  .mobile-gcal{display:block;padding:0.75rem 0.75rem 0}
  .mobile-sync-btn{border-color:var(--purple-200);color:var(--purple-600)}
  .mobile-sync-btn:hover{background:var(--purple-50)}
  #gcal-status{display:none}
  .dl-txt{display:block!important;min-width:auto;font-size:11px}
  .dl-txt::before{content:'〜'}
  .col-cat-badge{display:none}
  .main{padding:0.75rem 0.75rem 5rem}
  .field input,.field select,.field textarea{font-size:16px}
  .field input[type=date]{width:100%;max-width:100%;box-sizing:border-box;-webkit-appearance:none;appearance:none}
  .float-add-btn{display:flex;align-items:center;justify-content:center;position:fixed;bottom:1.5rem;right:1.5rem;width:52px;height:52px;background:var(--purple-600);color:#fff;border:none;border-radius:50%;font-size:26px;line-height:1;cursor:pointer;z-index:50;box-shadow:0 4px 16px rgba(83,74,183,.45)}
  .float-add-btn:active{background:var(--purple-800);transform:scale(0.95)}
  .float-search-btn{display:flex;align-items:center;justify-content:center;position:fixed;bottom:1.5rem;right:5.5rem;width:52px;height:52px;background:var(--surface);color:var(--text-2);border:1.5px solid var(--border-2);border-radius:50%;cursor:pointer;z-index:50;box-shadow:0 4px 12px rgba(0,0,0,.12)}
  .float-search-btn:active{transform:scale(0.95)}
  .mobile-search-overlay{position:fixed;top:0;left:0;right:0;z-index:200;background:var(--surface);border-bottom:1.5px solid var(--border);padding:0.75rem 1rem;display:none;align-items:center;gap:8px}
  .mobile-search-overlay.open{display:flex}
  .mobile-search-overlay input{flex:1;font-size:16px;padding:8px 12px;border-radius:var(--radius-md);border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font);outline:none}
  .mobile-search-overlay input:focus{border-color:var(--purple-400)}
  .mobile-search-overlay button{width:36px;height:36px;border:none;background:transparent;font-size:18px;color:var(--text-2);cursor:pointer;flex-shrink:0}
}

/* クイック追加シート（モバイル専用、グローバルに定義） */
.quick-add-overlay{display:none;position:fixed;inset:0;z-index:140;background:rgba(0,0,0,.3)}
.quick-add-overlay.open{display:block}
.quick-add-sheet{position:fixed;bottom:0;left:0;right:0;z-index:150;background:var(--surface);border-top:1.5px solid var(--border);border-radius:20px 20px 0 0;padding:1.25rem 1rem 2rem;box-shadow:0 -4px 24px rgba(0,0,0,.12);transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);display:none}
.quick-add-sheet.open{transform:translateY(0);display:block}
@media(min-width:641px){
  .quick-add-sheet{left:50%;right:auto;width:400px;transform:translateX(-50%) translateY(100%)}
  .quick-add-sheet.open{transform:translateX(-50%) translateY(0)}
}
.quick-add-sheet.open{transform:translateY(0);display:block}
.quick-add-handle{width:36px;height:4px;background:var(--border-2);border-radius:2px;margin:0 auto 1.25rem}
.quick-add-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:1rem}
.qa-field{margin-bottom:12px}
.qa-label{display:block;font-size:11px;font-weight:700;color:var(--text-2);margin-bottom:4px;letter-spacing:.05em;text-transform:uppercase}
.qa-input{width:100%;font-size:16px;padding:10px 12px;border-radius:var(--radius-md);border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font);outline:none}
.qa-input:focus{border-color:var(--purple-400)}
.quick-add-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:1.25rem}
.quick-add-btns button{height:44px;font-size:14px;font-weight:500;border-radius:var(--radius-md);border:1.5px solid var(--border);background:transparent;color:var(--text);font-family:var(--font);cursor:pointer}
.quick-add-btns .qa-ok{background:var(--purple-600);color:#fff;border-color:var(--purple-600)}
.quick-add-btns .qa-detail{background:var(--bg);color:var(--purple-600);border-color:var(--purple-200)}
.quick-add-sheet.keyboard-up{transform:translateY(0);bottom:var(--qa-keyboard-offset,0px)}

<script>
const CAT_COLORS=[
  {bg:'#EEEDFE',border:'#AFA9EC',icon:'#534AB7',text:'#3C3489',prog:'#7F77DD'},
  {bg:'#E1F5EE',border:'#9FE1CB',icon:'#0F6E56',text:'#085041',prog:'#1D9E75'},
  {bg:'#FAEEDA',border:'#FAC775',icon:'#854F0B',text:'#633806',prog:'#BA7517'},
  {bg:'#FBEAF0',border:'#F4C0D1',icon:'#993556',text:'#72243E',prog:'#D4537E'},
  {bg:'#E6F1FB',border:'#B5D4F4',icon:'#185FA5',text:'#0C447C',prog:'#378ADD'},
  {bg:'#EAF3DE',border:'#C0DD97',icon:'#3B6D11',text:'#27500A',prog:'#639922'},
  {bg:'#F1EFE8',border:'#D3D1C7',icon:'#5F5E5A',text:'#444441',prog:'#888780'},
  {bg:'#FCEBEB',border:'#F7C1C1',icon:'#A32D2D',text:'#791F1F',prog:'#E24B4A'},
];
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

const CATS=['仕事','講師','プライベート','その他'];
const STATUSES=['進行中','完了'];
const PRIOS=['高','中','低'];
const STORAGE_KEY='tkm_tasks_v1';
const COLLAPSED_KEY='tkm_collapsed_v1';
const CATORDER_KEY='tkm_catorder_v1';
const GAS_URL='https://script.google.com/macros/s/AKfycbyz20HVKeYQOJMMMgmXEbmbjYnE5QkK38e9Ij887VNqmV8KwYECOfLRutwMbuqTq9IX8A/exec';
const SECRET_TOKEN='tkm-Xr9pK2mNvQ4wBj7L';
const DEVICE_KEY='tkm_device_id';

// デバイスIDを永続生成（初回のみ）
function getDeviceId(){
  let id=localStorage.getItem(DEVICE_KEY);
  if(!id){id='dev_'+Math.random().toString(36).slice(2,9);localStorage.setItem(DEVICE_KEY,id);}
  return id;
}
const DEVICE_ID=getDeviceId();

let tasks=[];
let nextId=1;
let modal=null,editingId=null;
let search='',filterStatus='進行中',filterPrio='',filterCat='';
let collapsed={};
let catOrder=[...CATS];
let dataVersion=0;        // 自分が最後に読んだクラウドのversion
let cloudVersionCache=0;  // クラウドの最新version（push前に確認用）

function load(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){const d=JSON.parse(raw);tasks=d.tasks||[];nextId=d.nextId||tasks.length+1;
      dataVersion=d.version||0;
      const catMap={'社史・周年史':'仕事','座談会・インタビュー':'仕事','文字起こし・校正':'仕事','書籍・創作':'仕事','講師業':'講師'};
      tasks.forEach((t,i)=>{if(t.order==null)t.order=i;if(t.status==='未着手')t.status='進行中';if(catMap[t.cat])t.cat=catMap[t.cat];});
    }
    else{tasks=defaultTasks();nextId=tasks.length+1;dataVersion=0;}
    const c=localStorage.getItem(COLLAPSED_KEY);
    if(c)collapsed=JSON.parse(c);
    const co=localStorage.getItem(CATORDER_KEY);
    if(co){const saved=JSON.parse(co);catOrder=[...saved,...CATS.filter(c=>!saved.includes(c))];}
  }catch(e){tasks=defaultTasks();nextId=tasks.length+1;dataVersion=0;}
}

function saveData(){
  dataVersion++;
  localStorage.setItem(STORAGE_KEY,JSON.stringify({tasks,nextId,updatedAt:Date.now(),version:dataVersion,updatedBy:DEVICE_ID}));
  localStorage.setItem(COLLAPSED_KEY,JSON.stringify(collapsed));
  localStorage.setItem(CATORDER_KEY,JSON.stringify(catOrder));
  const now=new Date();
  document.getElementById('save-note').textContent='自動保存: '+now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');
  pushToCloud();
}

let syncTimer=null;
function pushToCloud(){
  clearTimeout(syncTimer);
  syncTimer=setTimeout(()=>{
    setSyncStatus('ing','同期中…');
    pushToCloudNow();
  },1500);
}

function setSyncStatus(type,msg){
  const el=document.getElementById('sync-status');
  const el2=document.getElementById('sync-status-mobile');
  [el,el2].forEach(e=>{
    if(!e)return;
    e.className='sync-status sync-'+type;
    e.textContent=msg;
  });
}

async function loadFromCloud(){
  setSyncStatus('ing','クラウド確認中…');
  try{
    const res=await fetch(GAS_URL+'?t='+Date.now()+'&token='+SECRET_TOKEN,{redirect:'follow'});
    const text=await res.text();
    if(!text||text==='{}')return setSyncStatus('ok','クラウド: データなし');
    let cloud;
    try{cloud=JSON.parse(text);}catch(e){return setSyncStatus('err','データ形式エラー');}
    if(!cloud.tasks)return setSyncStatus('ok','クラウド: データなし');

    cloudVersionCache=cloud.version||0;
    const cloudUpdatedAt=cloud.updatedAt||0;
    const cloudBy=cloud.updatedBy||'不明';
    const localUpdatedAt=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}').updatedAt||0;

    const dirtyTasks=tasks.filter(t=>t.dirty);
    const hasDirty=dirtyTasks.length>0;

    // クラウドの方が新しい＆ローカルにdirtyがある → 競合
    if(hasDirty && cloudUpdatedAt > localUpdatedAt){
      const cloudTime=_fmtTime(cloudUpdatedAt);
      const names=dirtyTasks.map(t=>'・'+t.title).join('\n');
      const msg=
        `⚠️ 競合を検出しました\n\n`+
        `クラウド: ${cloudBy} / ${cloudTime} (v${cloudVersionCache})\n`+
        `このデバイス: ${DEVICE_ID} / 未同期 ${dirtyTasks.length}件\n\n`+
        `未同期のタスク:\n${names}\n\n`+
        `【OK】クラウドを取り込んでから、このデバイスの変更を上書き保存\n`+
        `【キャンセル】クラウドのデータをそのまま使う（ローカルの変更は破棄）`;
      if(confirm(msg)){
        // クラウドをベースにローカルdirtyを上書きマージ
        const mergedTasks=cloud.tasks.slice();
        dirtyTasks.forEach(dt=>{
          const idx=mergedTasks.findIndex(ct=>ct.id===dt.id);
          if(idx>=0)mergedTasks[idx]=dt;
          else mergedTasks.push(dt);
        });
        tasks=mergedTasks;
        nextId=Math.max(cloud.nextId||0,...mergedTasks.map(t=>t.id+1));
        if(cloud.catOrder)catOrder=cloud.catOrder;
        if(cloud.collapsed)collapsed=cloud.collapsed;
        tasks.forEach(t=>delete t.dirty);
        dataVersion=cloudVersionCache; // クラウドのversionをベースに
        saveData(); // これでdataVersion++されてクラウドに上書き
        setSyncStatus('ok','競合を解決してクラウドに保存しました');
        advanceRepeating();render();
        return;
      }
      // キャンセル → クラウドで上書き（下に流れる）
    }

    // クラウドが新しい（競合なし）→ 素直に取り込む
    if(cloudUpdatedAt >= localUpdatedAt || !hasDirty){
      const catMap={'社史・周年史':'仕事','座談会・インタビュー':'仕事','文字起こし・校正':'仕事','書籍・創作':'仕事','講師業':'講師'};
      tasks=cloud.tasks;
      nextId=cloud.nextId||tasks.length+1;
      if(cloud.catOrder)catOrder=cloud.catOrder;
      if(cloud.collapsed)collapsed=cloud.collapsed;
      dataVersion=cloudVersionCache;
      tasks.forEach((t,i)=>{if(t.order==null)t.order=i;if(t.status==='未着手')t.status='進行中';if(catMap[t.cat])t.cat=catMap[t.cat];});
      try{
        localStorage.setItem(STORAGE_KEY,JSON.stringify({tasks,nextId,updatedAt:cloudUpdatedAt,version:dataVersion,updatedBy:cloudBy}));
        localStorage.setItem(COLLAPSED_KEY,JSON.stringify(collapsed));
        localStorage.setItem(CATORDER_KEY,JSON.stringify(catOrder));
      }catch(e){}
      setSyncStatus('ok','クラウドから読み込み済み');
      advanceRepeating();render();
    }
  }catch(e){
    setSyncStatus('err','接続エラー');
  }
}

function _fmtTime(ts){
  if(!ts)return '不明';
  const d=new Date(ts);
  const diff=Math.round((Date.now()-ts)/60000);
  if(diff<1)return 'たった今';
  if(diff<60)return diff+'分前';
  if(diff<1440)return Math.round(diff/60)+'時間前';
  return `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
}

async function pushToCloudNow(){
  // push前にクラウドのversionを確認（古い状態で上書きしない）
  try{
    const chk=await fetch(GAS_URL+'?t='+Date.now()+'&token='+SECRET_TOKEN+'&checkonly=1',{redirect:'follow'});
    const chkText=await chk.text();
    if(chkText&&chkText!=='{}'){
      let chkData;
      try{chkData=JSON.parse(chkText);}catch(e){}
      if(chkData&&chkData.version&&chkData.version>dataVersion){
        // クラウドの方が新しい → 自動マージを試みる
        setSyncStatus('err','競合検出: クラウドが更新されています');
        const cloudTime=_fmtTime(chkData.updatedAt||0);
        const cloudBy=chkData.updatedBy||'不明';
        const ok=confirm(
          `⚠️ 保存競合\n\n`+
          `クラウド: ${cloudBy} / ${cloudTime} (v${chkData.version})\n`+
          `このデバイス: ${DEVICE_ID} (v${dataVersion})\n\n`+
          `【OK】このデバイスの内容でクラウドを上書き\n`+
          `【キャンセル】クラウドから最新データを取り込む`
        );
        if(!ok){
          await loadFromCloud();
          return;
        }
        // OKなら強制上書き（dataVersionをクラウドより大きくする）
        dataVersion=chkData.version+1;
        cloudVersionCache=dataVersion;
      }
    }
  }catch(e){/* チェック失敗はそのまま続行 */}

  const payload=JSON.stringify({tasks,nextId,catOrder,collapsed,updatedAt:Date.now(),version:dataVersion,updatedBy:DEVICE_ID,token:SECRET_TOKEN});
  try{
    const res=await fetch(GAS_URL,{method:'POST',body:payload,redirect:'follow'});
    const text=await res.text();
    let result;
    try{result=JSON.parse(text);}catch(e){setSyncStatus('err','レスポンス形式エラー');return;}
    if(!result){setSyncStatus('err','レスポンスなし');return;}
    if(result.error){setSyncStatus('err','保存エラー: '+result.error);return;}
    if(result.conflict){setSyncStatus('err','競合: 再読み込みしてください');return;}
    if(!result.ok){setSyncStatus('err','保存失敗');return;}
    tasks.forEach(t=>delete t.dirty);
    localStorage.setItem(STORAGE_KEY,JSON.stringify({tasks,nextId,updatedAt:Date.now(),version:dataVersion,updatedBy:DEVICE_ID}));
    cloudVersionCache=dataVersion;
    setSyncStatus('ok','クラウド同期済み (v'+dataVersion+')');
  }catch(e){
    setSyncStatus('err','同期エラー');
  }
}
function defaultTasks(){
  const t=today();
  const d=(offset)=>{const dt=new Date(t+'T00:00:00');dt.setDate(dt.getDate()+offset);return dt.toISOString().slice(0,10);};
  return [
    {id:1,title:'クライアントA　周年史トップインタビュー原稿',cat:'仕事',prio:'高',deadline:d(5),status:'進行中',memo:'',order:0},
    {id:2,title:'クライアントB　テーマ原稿（8000字）',cat:'仕事',prio:'高',deadline:d(10),status:'進行中',memo:'',order:1},
    {id:3,title:'クライアントC　長編原稿',cat:'仕事',prio:'中',deadline:d(20),status:'進行中',memo:'',order:2},
    {id:4,title:'クライアントD　製品技術史記事',cat:'仕事',prio:'中',deadline:d(30),status:'進行中',memo:'',order:3},
    {id:5,title:'クライアントE　文字起こし校正',cat:'仕事',prio:'高',deadline:d(2),status:'進行中',memo:'サンプルメモ',order:4},
    {id:6,title:'クライアントF　座談会再構成',cat:'仕事',prio:'中',deadline:d(15),status:'進行中',memo:'',order:5},
    {id:7,title:'クライアントG　トップインタビュー記事',cat:'仕事',prio:'低',deadline:d(35),status:'進行中',memo:'',order:6},
    {id:8,title:'書籍プロジェクト　校正・章立て確認',cat:'仕事',prio:'中',deadline:d(50),status:'進行中',memo:'',order:7},
  ];
}

function today(){return new Date().toISOString().slice(0,10);}
function isOver(d,st){return d&&d<today()&&st==='進行中';}
function isWeekNear(d,st){
  if(!d||st!=='進行中')return false;
  const diff=(new Date(d+'T00:00:00')-new Date(today()+'T00:00:00'))/(1000*60*60*24);
  return diff>=0&&diff<7;
}
function isImminent(d,st){
  if(!d||st!=='進行中')return false;
  const diff=(new Date(d+'T00:00:00')-new Date(today()+'T00:00:00'))/(1000*60*60*24);
  return diff>=0&&diff<1;
}
function catColor(cat){return CAT_COLORS[CATS.indexOf(cat)%CAT_COLORS.length]||CAT_COLORS[0];}
function catInitial(cat){const m={'仕事':'仕','講師':'講','プライベート':'私','その他':'他'};return m[cat]||cat[0];}

function advanceRepeating(){
  const todayStr=today();
  let changed=false;
  tasks.forEach(t=>{
    if(!t.repeat||!t.deadline)return;
    if(t.deadline<=todayStr){
      const days=t.repeat==='weekly'?7:14;
      const d=new Date(t.deadline+'T00:00:00');
      while(d.toISOString().slice(0,10)<=todayStr) d.setDate(d.getDate()+days);
      t.deadline=d.toISOString().slice(0,10);
      t.status='進行中';
      changed=true;
    }
  });
  if(changed)saveData();
}

function render(){
  const list=tasks.filter(t=>
    (!search||t.title.includes(search)||t.memo.includes(search))&&
    (!filterStatus||t.status===filterStatus)&&
    (!filterPrio||t.prio===filterPrio)&&
    (!filterCat||t.cat===filterCat)
  );

  const total=tasks.length,done=tasks.filter(t=>t.status==='完了').length;
  const wip=tasks.filter(t=>t.status==='進行中').length;
  const hi=tasks.filter(t=>t.prio==='高'&&t.status==='進行中').length;

  const priv=tasks.filter(t=>t.cat==='プライベート').length;

  const isAll=filterStatus===''&&filterPrio===''&&filterCat==='';
  const isWip=filterStatus==='進行中'&&filterPrio===''&&filterCat==='';
  const isDone=filterStatus==='完了'&&filterPrio===''&&filterCat==='';
  const isPriv=filterCat==='プライベート'&&filterStatus===''&&filterPrio==='';

  document.getElementById('stats').innerHTML=`
    <div class="stat stat-wip${isWip?' active':''}" onclick="setFilter('進行中','','')"><div class="stat-n">${wip}</div><div class="stat-l">On Going</div></div>
    <div class="stat stat-done${isDone?' active':''}" onclick="setFilter('完了','','')"><div class="stat-n">${done}</div><div class="stat-l">Finished</div></div>
    <div class="stat stat-priv${isPriv?' active':''}" onclick="setFilter('','','プライベート')"><div class="stat-n">${priv}</div><div class="stat-l">Private</div></div>
    <div class="stat stat-all${isAll?' active':''}" onclick="setFilter('','','')"><div class="stat-n">${total}</div><div class="stat-l">All Tasks</div></div>`;

  const usedCats=[...new Set(list.map(t=>t.cat))].sort((a,b)=>catOrder.indexOf(a)-catOrder.indexOf(b));
  const el=document.getElementById('groups');

  if(!usedCats.length){el.innerHTML='<div class="empty-search">該当するタスクがありません</div>';return;}

  el.innerHTML=usedCats.map(cat=>{
    const col=catColor(cat);
    const items=list.filter(t=>t.cat===cat).sort((a,b)=>(a.order??0)-(b.order??0));
    const doneCnt=items.filter(t=>t.status==='完了').length;
    const pct=items.length?Math.round(doneCnt/items.length*100):0;
    const isOpen=!collapsed[cat];
    const rows=isOpen?items.map(t=>{
      const pc=t.prio==='高'?'p-high':t.prio==='中'?'p-mid':'p-low';
      const isDone=t.status==='完了';
      const over=isOver(t.deadline,t.status);
      const imminent=isImminent(t.deadline,t.status);
      const weekNear=isWeekNear(t.deadline,t.status);
      const rowBg=isDone?'row-done':imminent?'row-imminent':t.prio==='高'?'row-high':t.prio==='中'?'row-mid':'row-low';
      const chkCls=isDone?'done':'wip';
      const dlDisplay=t.deadline?t.deadline.slice(5).replace('-','/'):'—';
      const repeatLabel=t.repeat==='weekly'?'↻毎週':t.repeat==='biweekly'?'↻隔週':'';
      return `<div class="task-row ${rowBg}" draggable="true" data-id="${t.id}" data-cat="${cat}">
        <div class="drag-handle" title="ドラッグで並べ替え"><span></span><span></span><span></span></div>
        <div class="t-check ${chkCls}" onclick="toggleDone(${t.id})" title="クリックで完了/進行中を切替"></div>
        <div class="t-title${isDone?' is-done':''} mobile-tap-edit" onclick="handleTaskTap(event,${t.id})">
          ${esc(t.title)}${t.memo?`<div class="t-memo">${esc(t.memo)}</div>`:''}
        </div>
        <span class="badge ${pc} col-cat-badge">${t.prio}</span>
        ${repeatLabel?`<span class="repeat-badge">${repeatLabel}</span>`:''}
        ${t.dirty?`<span class="dirty-badge" title="未同期">●</span>`:''}
        <span class="dl-txt${over?' dl-over':weekNear?' dl-week-near':''} mobile-tap-edit" onclick="handleTaskTap(event,${t.id})">${dlDisplay}</span>
        <button class="act-btn mobile-hide" onclick="openEdit(${t.id})" title="編集"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11.5 2.5l2 2L5 13H3v-2L11.5 2.5z"/></svg></button>
        <button class="act-btn del-btn mobile-hide" onclick="del(${t.id})" title="削除"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,5 13,5"/><path d="M6 5V3h4v2"/><path d="M4 5l1 8h6l1-8"/></svg></button>
      </div>`;
    }).join(''):'';

    return `<div class="group" draggable="false" data-cat="${cat}" style="background:${col.bg};border-color:${col.border}">
      <div class="group-header" onclick="toggleGroup('${cat}')">
        <div class="drag-handle cat-drag-handle" title="ドラッグでカテゴリを並べ替え" onclick="event.stopPropagation()"><span></span><span></span><span></span></div>
        <div class="g-icon" style="background:${col.icon}">${catInitial(cat)}</div>
        <div class="g-name" style="color:${col.text}">${cat}</div>
        <div class="g-meta" style="color:${col.text}">${items.length}件 · ${pct}%完了</div>

}

let dragSrcId=null;

function bindDrag(){
  document.querySelectorAll('.task-row[draggable]').forEach(row=>{
    // Mouse drag (desktop)
    row.addEventListener('dragstart',e=>{
      dragSrcId=parseInt(row.dataset.id);
      setTimeout(()=>row.classList.add('dragging'),0);
      e.dataTransfer.effectAllowed='move';
    });
    row.addEventListener('dragend',()=>{
      document.querySelectorAll('.task-row').forEach(r=>r.classList.remove('dragging','drag-over'));
    });
    row.addEventListener('dragover',e=>{
      e.preventDefault();
      e.dataTransfer.dropEffect='move';
      document.querySelectorAll('.task-row').forEach(r=>r.classList.remove('drag-over'));
      row.classList.add('drag-over');
    });
    row.addEventListener('dragleave',()=>row.classList.remove('drag-over'));
    row.addEventListener('drop',e=>{
      e.preventDefault();
      const targetId=parseInt(row.dataset.id);
      if(dragSrcId===targetId)return;
      const cat=row.dataset.cat;
      const catTasks=tasks.filter(t=>t.cat===cat).sort((a,b)=>(a.order??0)-(b.order??0));
      const srcIdx=catTasks.findIndex(t=>t.id===dragSrcId);
      const tgtIdx=catTasks.findIndex(t=>t.id===targetId);
      if(srcIdx<0||tgtIdx<0)return;
      const [moved]=catTasks.splice(srcIdx,1);
      catTasks.splice(tgtIdx,0,moved);
      catTasks.forEach((t,i)=>{t.order=i;});
      saveData();render();
    });

    // Touch drag (iOS)
    const handle=row.querySelector('.drag-handle');
    if(!handle)return;
    handle.addEventListener('touchstart',e=>{
      e.stopPropagation();
      dragSrcId=parseInt(row.dataset.id);
      row.classList.add('dragging');
    },{passive:true});
    handle.addEventListener('touchmove',e=>{
      e.preventDefault();
      const touch=e.touches[0];
      const el=document.elementFromPoint(touch.clientX,touch.clientY);
      const targetRow=el?.closest('.task-row');
      document.querySelectorAll('.task-row').forEach(r=>r.classList.remove('drag-over'));
      if(targetRow&&targetRow!==row) targetRow.classList.add('drag-over');
    },{passive:false});
    handle.addEventListener('touchend',e=>{
      e.stopPropagation();
      const overRow=document.querySelector('.task-row.drag-over');
      document.querySelectorAll('.task-row').forEach(r=>r.classList.remove('dragging','drag-over'));
      if(!overRow||!dragSrcId)return;
      const targetId=parseInt(overRow.dataset.id);
      if(dragSrcId===targetId)return;
      const cat=overRow.dataset.cat;
      const catTasks=tasks.filter(t=>t.cat===cat).sort((a,b)=>(a.order??0)-(b.order??0));
      const srcIdx=catTasks.findIndex(t=>t.id===dragSrcId);
      const tgtIdx=catTasks.findIndex(t=>t.id===targetId);
      if(srcIdx<0||tgtIdx<0)return;
      const [moved]=catTasks.splice(srcIdx,1);
      catTasks.splice(tgtIdx,0,moved);
      catTasks.forEach((t,i)=>{t.order=i;});
      saveData();render();
    });
  });
}

let catDragSrc=null;

function bindCatDrag(){
  document.querySelectorAll('.group').forEach(grp=>{
    const handle=grp.querySelector('.cat-drag-handle');
    if(!handle)return;
    handle.addEventListener('mousedown',()=>{grp.setAttribute('draggable','true');});
    grp.addEventListener('dragstart',e=>{
      catDragSrc=grp.dataset.cat;
      setTimeout(()=>grp.classList.add('cat-dragging'),0);
      e.dataTransfer.effectAllowed='move';
      e.stopPropagation();
    });
    grp.addEventListener('dragend',()=>{
      grp.setAttribute('draggable','false');
      document.querySelectorAll('.group').forEach(g=>g.classList.remove('cat-dragging','cat-drag-over'));
    });
    grp.addEventListener('dragover',e=>{
      if(!catDragSrc||catDragSrc===grp.dataset.cat)return;
      e.preventDefault();
      e.stopPropagation();
      document.querySelectorAll('.group').forEach(g=>g.classList.remove('cat-drag-over'));
      grp.classList.add('cat-drag-over');
    });
    grp.addEventListener('dragleave',()=>grp.classList.remove('cat-drag-over'));
    grp.addEventListener('drop',e=>{
      if(!catDragSrc||catDragSrc===grp.dataset.cat)return;
      e.preventDefault();
      e.stopPropagation();
      const srcIdx=catOrder.indexOf(catDragSrc);
      const tgtIdx=catOrder.indexOf(grp.dataset.cat);
      if(srcIdx<0||tgtIdx<0)return;
      catOrder.splice(srcIdx,1);
      catOrder.splice(tgtIdx,0,catDragSrc);

      saveData();render();

}

function reorderByDeadline(cat){
  const catTasks=tasks.filter(t=>t.cat===cat);
  catTasks.sort((a,b)=>{
    const ad=a.deadline||'9999-99-99', bd=b.deadline||'9999-99-99';
    return ad<bd?-1:ad>bd?1:0;
  });
  catTasks.forEach((t,i)=>{t.order=i;});
}

function _validateBackup(d){
  if(!d||typeof d!=='object')return 'データ形式が不正です';
  if(!Array.isArray(d.tasks))return 'tasksが配列ではありません';
  if(d.tasks.length>500)return `タスク数が上限（500件）を超えています（${d.tasks.length}件）`;
  const REQUIRED=['id','title','cat','prio','status'];
  const VALID_PRIO=['高','中','低'];
  const VALID_STATUS=['進行中','完了'];
  const VALID_CAT=['仕事','講師','プライベート','その他'];
  for(let i=0;i<d.tasks.length;i++){
    const t=d.tasks[i];
    for(const f of REQUIRED){
      if(t[f]===undefined||t[f]===null)return `タスク${i+1}番目に「${f}」がありません`;
    }
    if(!VALID_PRIO.includes(t.prio))return `タスク${i+1}番目の優先度が不正です: ${t.prio}`;
    if(!VALID_STATUS.includes(t.status))return `タスク${i+1}番目のステータスが不正です: ${t.status}`;
    if(!VALID_CAT.includes(t.cat))return `タスク${i+1}番目のカテゴリが不正です: ${t.cat}`;
    if(typeof t.title!=='string'||t.title.length>500)return `タスク${i+1}番目のタイトルが不正です`;
    if(t.memo&&(typeof t.memo!=='string'||t.memo.length>2000))return `タスク${i+1}番目のメモが不正です`;
  }
  return null;
}

function importBackup(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      const err=_validateBackup(d);
      if(err){alert('バックアップファイルの検証に失敗しました。\n\n理由: '+err);return;}
      if(!confirm(`バックアップを復元します。現在のデータは上書きされます。\n（タスク数: ${d.tasks.length}件、保存日時: ${d.exportedAt||'不明'}）\n\nよろしいですか？`))return;
      tasks=d.tasks;
      nextId=d.nextId||tasks.length+1;
      if(d.catOrder)catOrder=d.catOrder;
      if(d.collapsed)collapsed=d.collapsed;
      tasks.forEach((t,i)=>{if(t.order==null)t.order=i;if(t.status==='未着手')t.status='進行中';});
      saveData();render();
      alert('復元が完了しました。');
    }catch(err){alert('ファイルの読み込みに失敗しました。正しいJSONファイルか確認してください。');}
  };
  reader.readAsText(file);
  e.target.value='';
}

const GCAL_CLIENT_ID='503377575059-qs56i6jolds19soudogiq4p2j5pjeo6c.apps.googleusercontent.com';
const GCAL_SCOPE='https://www.googleapis.com/auth/calendar.events';
const GCAL_API='https://www.googleapis.com/calendar/v3/calendars/primary/events';
const GCAL_ID_KEY='tkm_gcal_ids_v1';

let gcalToken=null;

function setGcalStatus(msg,color){

function gcalSignIn(){
  return new Promise((resolve,reject)=>{
    const client=google.accounts.oauth2.initTokenClient({
      client_id:GCAL_CLIENT_ID,
      scope:GCAL_SCOPE,
      callback:(resp)=>{
        if(resp.error){reject(resp.error);return;}
        gcalToken=resp.access_token;
        resolve(resp.access_token);
      }
    });
    client.requestAccessToken();
  });
}

async function syncToGcal(){
  const btn=document.getElementById('gcal-btn-label');
  btn.textContent='認証中…';
  setGcalStatus('Googleにサインイン中…');
  try{
    if(!gcalToken) await gcalSignIn();
    btn.textContent='同期中…';
    setGcalStatus('カレンダーに書き込み中…');

    const storedIds=JSON.parse(localStorage.getItem(GCAL_ID_KEY)||'{}');
    const targets=tasks.filter(t=>t.deadline);
    let added=0,updated=0,skipped=0;

    for(const t of targets){
      const summary=t.title;
      const desc=`優先度: ${t.prio}${t.memo?'\n'+t.memo:''}${t.repeat?'\n繰り返し: '+(t.repeat==='weekly'?'毎週':'隔週'):''}`;
      const event={
        summary,
        description:desc,
        start:{date:t.deadline},
        end:{date:t.deadline},
        colorId:t.prio==='高'?'11':t.prio==='中'?'5':'2',
      };
      const existingId=storedIds[t.id];
      if(existingId){
        const r=await fetch(`${GCAL_API}/${existingId}`,{
          method:'PUT',
          headers:{'Authorization':'Bearer '+gcalToken,'Content-Type':'application/json'},
          body:JSON.stringify(event)
        });
        if(r.ok){updated++;}
        else if(r.status===404){
          const r2=await fetch(GCAL_API,{method:'POST',headers:{'Authorization':'Bearer '+gcalToken,'Content-Type':'application/json'},body:JSON.stringify(event)});
          if(r2.ok){const d=await r2.json();storedIds[t.id]=d.id;added++;}
        }
      } else {
        const r=await fetch(GCAL_API,{
          method:'POST',
          headers:{'Authorization':'Bearer '+gcalToken,'Content-Type':'application/json'},
          body:JSON.stringify(event)
        });
        if(r.ok){const d=await r.json();storedIds[t.id]=d.id;added++;}
        else skipped++;
      }
    }

    // 完了タスクのイベントを削除
    const completedIds=tasks.filter(t=>t.status==='完了'&&storedIds[t.id]).map(t=>t.id);
    let deleted=0;
    for(const id of completedIds){
      const evId=storedIds[id];
      const r=await fetch(`${GCAL_API}/${evId}`,{method:'DELETE',headers:{'Authorization':'Bearer '+gcalToken}});
      if(r.ok||r.status===410){delete storedIds[id];deleted++;}
    }

    // アプリから削除されたタスクのイベントを削除（storedIdsにあるがtasksに存在しないID）
    const taskIds=new Set(tasks.map(t=>String(t.id)));
    const orphanIds=Object.keys(storedIds).filter(id=>!taskIds.has(id));
    for(const id of orphanIds){
      const evId=storedIds[id];
      const r=await fetch(`${GCAL_API}/${evId}`,{method:'DELETE',headers:{'Authorization':'Bearer '+gcalToken}});
      if(r.ok||r.status===410){delete storedIds[id];deleted++;}
    }

    localStorage.setItem(GCAL_ID_KEY,JSON.stringify(storedIds));
    btn.textContent='カレンダー同期';
    const msg=`追加${added} 更新${updated} 削除${deleted}${skipped?` エラー${skipped}`:''}`;
    setGcalStatus('同期完了: '+msg,'var(--green-600)');
    setTimeout(()=>setGcalStatus(''),5000);
  }catch(e){
    btn.textContent='カレンダー同期';
    setGcalStatus('エラー: '+e,'var(--coral-600)');
    gcalToken=null;
  }
}

    const geoData=await geo.json();
    const city=geoData.address?.city||geoData.address?.town||geoData.address?.village||'';
    document.getElementById('weather-location').textContent=city?`— ${city}`:'';
    // 天気取得
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode,windspeed_10m,relativehumidity_2m&hourly=temperature_2m,weathercode&timezone=Asia%2FTokyo&forecast_days=1`;
    const w=await fetch(url);
    const wd=await w.json();
    const cur=wd.current;
    const code=cur.weathercode;
    const hours=wd.hourly;
    const now=new Date();
    const nowH=now.getHours();
    // 次の4時間
    const slots=[];
    for(let i=0;i<4;i++){
      const h=(nowH+i+1)%24;
      const idx=hours.time.findIndex(t=>new Date(t).getHours()===h&&new Date(t).toDateString()===now.toDateString());
      if(idx>=0)slots.push({h,temp:Math.round(hours.temperature_2m[idx]),code:hours.weathercode[idx]});
    }
    el.innerHTML=`
      <div class="weather-now">
        <div style="font-size:36px;line-height:1">${WMO_ICON[code]||'🌡'}</div>
        <div>
          <div class="weather-temp">${Math.round(cur.temperature_2m)}°</div>
          <div class="weather-desc">${WMO_DESC[code]||'—'}</div>
          <div class="weather-sub">湿度 ${cur.relativehumidity_2m}% · 風速 ${Math.round(cur.windspeed_10m)}km/h</div>
        </div>
      </div>
      <div class="weather-hourly">
        ${slots.map(s=>`<div class="weather-hour"><div class="weather-hour-time">${s.h}時</div><div>${WMO_ICON[s.code]||'—'}</div><div class="weather-hour-temp">${s.temp}°</div></div>`).join('')}
      </div>`;
  }catch(e){
    if(e.code===1){
      document.getElementById('weather-content').innerHTML='<span class="widget-loading">位置情報の許可が必要です</span>';
    }else{
      document.getElementById('weather-content').innerHTML='<span class="widget-loading">取得できませんでした</span>';
    }
  }
}

// ── サイドバーカレンダー ──────────────────────────────
let calYear=new Date().getFullYear(),calMonth=new Date().getMonth();
function localDateStr(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function renderCal(){
  const el=document.getElementById('sidebar-cal');
  if(!el)return;
  const todayStr=today();
  const deadlines=new Set(tasks.filter(t=>t.deadline&&t.status!=='完了').map(t=>t.deadline));
  const y=calYear,m=calMonth;
  const first=new Date(y,m,1);
  const last=new Date(y,m+1,0);
  const monthStr=`${y}.${String(m+1).padStart(2,'0')}`;
  const days=[];
  const startDow=first.getDay();
  for(let i=0;i<startDow;i++) days.push({date:new Date(y,m,-(startDow-i-1)),cur:false});
  for(let d=1;d<=last.getDate();d++) days.push({date:new Date(y,m,d),cur:true});
  const rest=(7-days.length%7)%7;
  for(let d=1;d<=rest;d++) days.push({date:new Date(y,m+1,d),cur:false});
  const dows=['日','月','火','水','木','金','土'];
  el.innerHTML=`
    <div class="cal-header">
      <button class="cal-nav" onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCal()">‹</button>
      <span class="cal-month">${monthStr}</span>
      <button class="cal-nav" onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCal()">›</button>
    </div>
    <div class="cal-grid">
      ${dows.map((d,i)=>`<div class="cal-dow" style="${i===0?'color:var(--coral-400)':i===6?'color:var(--blue-400)':''}">${d}</div>`).join('')}
      ${days.map(({date,cur})=>{
        const ds=localDateStr(date);
        const isToday=ds===todayStr;
        const hasTask=deadlines.has(ds);
        const dow=date.getDay();
        let cls='cal-day';
        if(!cur)cls+=' other-month';
        if(isToday)cls+=' today';
        if(hasTask)cls+=' has-task';
        if(dow===0&&!isToday)cls+=' sun';
        if(dow===6&&!isToday)cls+=' sat';
        return `<div class="${cls}">${date.getDate()}</div>`;
      }).join('')}
    </div>`;
}
